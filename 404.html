<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 20px;
    }
    h1 {
      font-size: 72px;
      margin: 0;
    }
    p {
      font-size: 18px;
      color: #cbd5e1;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
    a:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <a href="/descript.com/">Go Home</a>
  </div>
</body>
</html>
